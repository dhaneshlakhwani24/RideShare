<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Superadmin Dashboard | RideShare')}"></head>
<body>
<div class="dashboard-shell">
    <div th:replace="~{fragments/navbar :: navbar('Superadmin Dashboard', 'Compliance review, approvals, and platform overview')}"></div>
    <main class="content-grid">
        <section class="panel hero-stats"><h1>Superadmin Dashboard</h1><p>Approve or reject driver applications and monitor platform metrics.</p><div class="stats-grid" id="adminStats"></div></section>
        <section class="panel">
            <div class="panel-head"><h2>Pending Driver Approvals</h2><p>Compliance requests waiting for your decision</p></div>
            <div class="table-wrap"><table class="table"><thead><tr><th>Driver ID</th><th>Request ID</th><th>Status</th><th>Remarks</th><th>Decision</th></tr></thead><tbody id="approvalTable"></tbody></table></div>
        </section>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
<script th:src="@{/js/urls.js}"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/admin-dashboard.js}"></script>
</body>
</html>
